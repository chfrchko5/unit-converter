<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8" content="width=device-width">
        <link rel="stylesheet" href="{{ url_for('static', filename='styling.css') }}">
    </head>
    <title>
        Unit Converter
    </title>

    <body>
        <h1>Unit converting web app</h1>

        <div class="initial_input">
            <label for="selectLabel"><h3>Select your measurement to continue</h3></label>
            <select id="option">
                <option value="">-- Select --</option>
                <option value="length">Length</option>
                <option value="weight">Weight</option>
                <option value="temperature">Temperature</option>
            </select>
        </div>
        
        <br>

        <!-- div 1 with the menu for length conversion -->
        <div id="length_convesion" style="display:none;">
            <form action="/convert-length" method="post">
                <p>
                    <label for="lengthFrom">Length measurement to convert from:</label>
                    <select name="lengthFrom" id="lengthFrom">
                        <option value="centimeters">Centimeters</option>
                        <option value="meters">Meters</option>
                        <option value="inches">Inches</option>
                        <option value="feet">Feet</option>
                    </select>
                </p>
                
                <p>
                    <label for="lengthTo">Length measurement to convert to:</label>
                    <select name="lengthTo" id="lengthTo">
                        <option value="centimeters">Centimeters</option>                
                        <option value="meters">Meters</option>
                        <option value="inches">Inches</option>
                        <option value="feet">Feet</option>
                    </select>
                </p>

                <p>
                    <label for="lengthInput">Enter the measurement:</label>
                    <input type="number" id="lengthInput" name="lengthInput">
                </p>

                <p class="button">
                    <button type="submit">Convert</button> <!-- i think this is where the javascript ting comes in for in real time display shit -->
                </p>
            </form>
        </div>

        

        <!-- div 2 with the menu for weight conversion -->
        <div id="weight_convesion" style="display:none;">
            <label for="weightLabel">Weight measurement to convert from:</label>
            <select name="weights" id="weights">
                <option value="pounds">Pounds</option>                
                <option value="ounces">Ounces</option>
                <option value="grams">Grams</option>
                <option value="kilograms">Kilograms</option>
            </select>
        </div>
        
        <!-- div 3 with the menu for weight conversion -->
        <div id="temperature_convesion" style="display:none;">
            <label for="tempLabel">Weight measurement to convert from:</label>
            <select name="temperature" id="temperature">
                <option value="celcius">Celcius</option>                
                <option value="fahrenheit">Fahrenheit</option>
                <option value="kelvin">Kelvin</option>
            </select>
        </div>

        <script>
            // script that displays the menu for the option selected by user
            const select = document.getElementById("option");

            select.addEventListener("change", function() {
                document.getElementById("length_convesion").style.display = "none";
                document.getElementById("weight_convesion").style.display = "none";

                if (this.value === "length") {
                    document.getElementById("length_convesion").style.display = "block";
                }

                if (this.value === "weight") {
                    document.getElementById("weight_convesion").style.display = "block";
                }
            });
        </script>
    </body>
</html>
