<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8" content="width=device-width">
        <link rel="stylesheet" href="{{ url_for('static', filename='styling.css') }}">
    </head>
    <title>
        Unit Converter
    </title>

    <body>
        <h1>Unit converting web app</h1>

        <div class="initial_input">
            <label for="selectLabel"><h3>Select your measurement to continue</h3></label>
            <select id="option">
                <option value="">-- Select --</option>
                <option value="length">Length</option>
                <option value="weight">Weight</option>
                <option value="temperature">Temperature</option>
            </select>
        </div>
        
        <br>

        <!-- div 1 with the menu for length conversion -->
        <div id="length_conversion" style="display:none;">
            <form id="lengthConverted">
                <p>
                    <label for="lengthFrom">Length measurement to convert from:</label>
                    <select name="lengthFrom" id="lengthFrom">
                        <option value="millimeter">Millimeters</option>                
                        <option value="centimeter">Centimeters</option>
                        <option value="meter">Meters</option>
                        <option value="inch">Inches</option>
                        <option value="foot">Feet</option>
                        <option value="yard">Yards</option>
                        <option value="mile">Miles</option>
                    </select>
                </p>
                
                <p>
                    <label for="lengthTo">Length measurement to convert to:</label>
                    <select name="lengthTo" id="lengthTo">
                        <option value="millimeter">Millimeters</option>                
                        <option value="centimeter">Centimeters</option>
                        <option value="meter">Meters</option>
                        <option value="inch">Inches</option>
                        <option value="foot">Feet</option>
                        <option value="yard">Yards</option>
                        <option value="mile">Miles</option>
                    </select>
                </p>

                <p>
                    <label for="lengthInput">Enter the measurement:</label>
                    <input type="number" id="lengthInput" name="lengthInput" required>
                </p>

                <p class="button">
                    <button type="submit">Convert</button>
                </p>
            </form>
        </div>
        
        <div id='length_response' style="display:none;"></div>

        <!-- div 2 with the menu for weight conversion -->
        <div id="weight_conversion" style="display:none;">
            <form id="weightConverted">
                <p>
                    <label for="weightFrom">Weight measurement to convert from:</label>
                    <select name="weightFrom" id="weightFrom">
                        <option value="milligram">Milligrams</option>                
                        <option value="gram">Grams</option>
                        <option value="kilogram">Kilograms</option>
                        <option value="ounce">Ounces</option>
                        <option value="pound">Pounds</option>
                    </select>
                </p>

                <p>
                    <label for="weightTo">Weight measurement to convert from:</label>
                    <select name="weightTo" id="weightTo">
                        <option value="milligram">Milligrams</option>                
                        <option value="gram">Grams</option>
                        <option value="kilogram">Kilograms</option>
                        <option value="ounce">Ounces</option>
                        <option value="pound">Pounds</option>
                    </select>
                </p>

                <p>
                    <label for="weightInput">Enter the measurement:</label>
                    <input type="number" id="weightInput" name="weightInput" required>
                </p>

                <p class="button">
                    <button type="submit">Convert</button>
                </p>
            </form>
        </div>

        <div id='weight_response' style="display:none;"></div>
        
        <!-- div 3 with the menu for temp conversion -->
        <div id="temperature_conversion" style="display:none;">
            <form id="tempConverted">
                <p>
                    <label for="tempFrom">Weight measurement to convert from:</label>
                    <select name="tempFrom" id="tempFrom">
                        <option value="celcius">Celcius</option>                
                        <option value="fahrenheit">Fahrenheit</option>
                        <option value="kelvin">Kelvin</option>
                    </select>

                </p>
                    <label for="tempTo">Weight measurement to convert from:</label>
                    <select name="tempTo" id="tempTo">
                        <option value="celcius">Celcius</option>                
                        <option value="fahrenheit">Fahrenheit</option>
                        <option value="kelvin">Kelvin</option>
                    </select>

                <p>
                    <label for="tempInput">Enter the measurement:</label>
                    <input type="number" id="tempInput" name="tempInput" required>
                </p>

                <p class="button">
                    <button type="submit">Convert</button>
                </p>
            </form>
        </div>

        <div id='temp_response' style="display:none;"></div>

        <script>
            // script that displays the menu for the option selected by user
            const select = document.getElementById("option");

            select.addEventListener("change", function() {
                document.getElementById("length_conversion").style.display = "none";
                document.getElementById("weight_conversion").style.display = "none";
                document.getElementById("temperature_conversion").style.display = "none";

                if (this.value === "length") {
                    document.getElementById("length_conversion").style.display = "block";
                }

                if (this.value === "weight") {
                    document.getElementById("weight_conversion").style.display = "block";
                }

                if (this.value === "temperature") {
                    document.getElementById("temperature_conversion").style.display = "block";
                }
            });

            
            // Helper function to handle form submissions
                function handleConversion(formId, responseId, endpoint) {
                const form = document.getElementById(formId);
                const responseDiv = document.getElementById(responseId);

                form.addEventListener('submit', function(e) {
                    e.preventDefault(); // stop page reload

                    // Hide all other responses before showing new one
                    document.querySelectorAll('.response').forEach(div => {
                        div.style.display = 'none';
                        div.innerHTML = '';
                    });

                    const formData = new FormData(this);

                    // Optional: show loading state
                    responseDiv.style.display = 'block';
                    responseDiv.innerHTML = 'Calculating...';

                    fetch(endpoint, {
                        method: 'POST',
                        body: formData
                    })
                    .then(res => res.text())
                    .then(html => {
                        responseDiv.innerHTML = html;  // show server response
                        responseDiv.style.display = 'block';
                    })
                    .catch(err => {
                        responseDiv.innerHTML = 'Error: ' + err;
                        responseDiv.style.display = 'block';
                    });
                });
            }

                // Add a common class to responses so we can hide them all at once
                document.getElementById('length_response').classList.add('response');
                document.getElementById('weight_response').classList.add('response');
                document.getElementById('temp_response').classList.add('response');

                // Attach handlers
                handleConversion('lengthConverted', 'length_response', '/convert-length');
                handleConversion('weightConverted', 'weight_response', '/convert-weight');
                handleConversion('tempConverted', 'temp_response', '/convert-temperature');
        </script>
    </body>
</html>
